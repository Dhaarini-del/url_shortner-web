services:
  - type: web
    name: url-shortener-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_URL
        sync: false
        description: "The full URL of your deployed app (e.g., https://your-app.onrender.com)"
      - key: DATABASE_URL # This will be set manually in Render Dashboard
        value: "your_postgres_connection_string_here" # Placeholder, Render will read from Dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
